# Pre-commit enforces ruff lint + format on every commit. One-time setup:
#
#     pip install pre-commit
#     pre-commit install
#
# Thereafter, `git commit` runs the hooks automatically. Run them manually
# across the repo with `pre-commit run --all-files`. Update pinned versions
# with `pre-commit autoupdate`.

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
