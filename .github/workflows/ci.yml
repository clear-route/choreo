name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff==0.15.11

      - name: ruff check
        run: ruff check packages/

      - name: ruff format --check
        run: ruff format --check packages/

  unit:
    name: unit (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs needs tags to resolve the version

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -e 'packages/core[test]'
          pip install -e 'packages/core-reporter[test]'

      - name: Run unit tests
        run: pytest -m "not e2e"

  e2e:
    name: e2e (nats, kafka, rabbitmq, redis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Bring up broker stack
        run: docker compose -f docker/compose.e2e.yaml --profile all up -d --wait

      - name: Install packages with all transport extras
        run: |
          python -m pip install --upgrade pip
          pip install -e 'packages/core[nats,kafka,rabbitmq,redis,test]'
          pip install -e 'packages/core-reporter[test]'

      - name: Run e2e tests
        run: pytest -m e2e

      - name: Tear down broker stack
        if: always()
        run: docker compose -f docker/compose.e2e.yaml --profile all down -v

  build:
    name: build + twine check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build wheels + sdists
        run: |
          python -m build packages/core --outdir dist/
          python -m build packages/core-reporter --outdir dist/

      - name: Validate distributions
        run: twine check dist/*

      - name: Upload build artefacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
