name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly Monday 07:15 UTC — the security job re-scans unchanged deps
    # so newly-disclosed CVEs surface without waiting on a commit.
    - cron: "15 7 * * 1"

# Default to least privilege. Individual jobs declare more if they need it.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff==0.15.11

      - name: ruff check
        run: ruff check packages/

      - name: ruff format --check
        run: ruff format --check packages/

  unit:
    name: unit (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # hatch-vcs needs tags to resolve the version

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install packages with every transport extra
        run: |
          python -m pip install --upgrade pip
          pip install -e 'packages/core[nats,kafka,rabbitmq,redis,test]'
          pip install -e 'packages/core-reporter[test]'
          pip install -e 'packages/chronicle[test]'

      - name: Run unit tests
        run: pytest -m "not e2e and not chronicle_db"

  e2e:
    name: e2e (nats, kafka, rabbitmq, redis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Bring up broker stack
        run: docker compose -f docker/compose.e2e.yaml --profile all up -d --wait

      - name: Install packages with all transport extras
        run: |
          python -m pip install --upgrade pip
          pip install -e 'packages/core[nats,kafka,rabbitmq,redis,test]'
          pip install -e 'packages/core-reporter[test]'

      - name: Run e2e tests with report
        run: pytest -m e2e -o "addopts=-n auto" --harness-report=test-report

      - name: Upload test report (workflow artefact)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: test-report-e2e
          path: test-report/
          retention-days: 30

      - name: Upload test report (Pages artefact)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3
        with:
          path: test-report/

      - name: Tear down broker stack
        if: always()
        run: docker compose -f docker/compose.e2e.yaml --profile all down -v

  chronicle-e2e:
    name: chronicle e2e (TimescaleDB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Bring up TimescaleDB
        run: docker compose -f docker/compose.chronicle.yaml up -d --wait

      - name: Install chronicle
        run: |
          python -m pip install --upgrade pip
          pip install -e 'packages/chronicle[test]'

      - name: Run migrations
        working-directory: packages/chronicle
        env:
          DATABASE_URL: postgresql+asyncpg://chronicle:chronicle@localhost:5433/chronicle
        run: alembic upgrade head

      - name: Run chronicle e2e tests
        env:
          DATABASE_URL: postgresql+asyncpg://chronicle:chronicle@localhost:5433/chronicle
        run: pytest packages/chronicle/tests/ -m chronicle_db -o "addopts="

      - name: Tear down TimescaleDB
        if: always()
        run: docker compose -f docker/compose.chronicle.yaml down -v

  build:
    name: build + twine check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/chronicle/frontend/package-lock.json

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build Chronicle frontend
        working-directory: packages/chronicle/frontend
        run: |
          npm ci
          npm run lint
          npm audit --omit=dev
          npm run build

      - name: Build wheels + sdists
        run: |
          python -m build packages/core --outdir dist/
          python -m build packages/core-reporter --outdir dist/
          python -m build packages/chronicle --outdir dist/

      - name: Validate distributions
        run: twine check dist/*

      - name: Upload build artefacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 7

  security:
    name: security (pip-audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install packages with every extra
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip install -e 'packages/core[nats,kafka,rabbitmq,redis,test]'
          pip install -e 'packages/core-reporter[test]'
          pip install -e 'packages/chronicle[test]'

      - name: pip-audit
        run: pip-audit --skip-editable

  publish-report:
    name: publish test report (GitHub Pages)
    needs: e2e
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4
