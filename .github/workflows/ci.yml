name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly Monday 07:15 UTC — the security job re-scans unchanged deps
    # so newly-disclosed CVEs surface without waiting on a commit.
    - cron: "15 7 * * 1"

# Default to least privilege. Individual jobs declare more if they need it.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff==0.15.11

      - name: ruff check
        run: ruff check packages/

      - name: ruff format --check
        run: ruff format --check packages/

  unit:
    name: unit (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # hatch-vcs needs tags to resolve the version

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install packages with every transport extra
        # Transport unit tests (test_rabbit_transport, test_redis_transport,
        # etc.) instantiate the transport to exercise no-broker paths like
        # credential redaction. Without the extras installed, the constructor
        # short-circuits with "transport requires <dep>" before the code under
        # test runs, which looks like a test bug but is really install surface.
        run: |
          python -m pip install --upgrade pip
          pip install -e 'packages/core[nats,kafka,rabbitmq,redis,test]'
          pip install -e 'packages/core-reporter[test]'

      - name: Run unit tests
        run: pytest -m "not e2e"

  e2e:
    name: e2e (nats, kafka, rabbitmq, redis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Bring up broker stack
        run: docker compose -f docker/compose.e2e.yaml --profile all up -d --wait

      - name: Install packages with all transport extras
        run: |
          python -m pip install --upgrade pip
          pip install -e 'packages/core[nats,kafka,rabbitmq,redis,test]'
          pip install -e 'packages/core-reporter[test]'

      - name: Run e2e tests with report
        # Override the default `--harness-report-disable` from addopts so the
        # reporter plugin writes to ./test-report/. Keeps xdist parallelism.
        run: pytest -m e2e -o "addopts=-n auto" --harness-report=test-report

      - name: Upload test report (workflow artefact)
        if: always()  # upload even on failure — the report is most useful when tests are broken
        uses: actions/upload-artifact@v4
        with:
          name: test-report-e2e
          path: test-report/
          retention-days: 30

      - name: Upload test report (Pages artefact)
        # Only build the Pages-format artefact on main pushes — PRs don't
        # publish to the canonical site. `deploy-pages` in the follow-up job
        # reads the single `github-pages` artefact this action produces.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: test-report/

      - name: Tear down broker stack
        if: always()
        run: docker compose -f docker/compose.e2e.yaml --profile all down -v

  build:
    name: build + twine check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build wheels + sdists
        run: |
          python -m build packages/core --outdir dist/
          python -m build packages/core-reporter --outdir dist/

      - name: Validate distributions
        run: twine check dist/*

      - name: Upload build artefacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 7

  security:
    name: security (pip-audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install packages with every extra
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip install -e 'packages/core[nats,kafka,rabbitmq,redis,test]'
          pip install -e 'packages/core-reporter[test]'

      - name: pip-audit
        run: pip-audit --skip-editable

  publish-report:
    # Deploy the e2e test report to GitHub Pages so it lives at a stable URL.
    # Only runs on main pushes: PRs generate the workflow artefact (above) but
    # never overwrite the canonical published report.
    name: publish test report (GitHub Pages)
    needs: e2e
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write       # deploy-pages needs write
      id-token: write    # OIDC for the Pages deployment
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
