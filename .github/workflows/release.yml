name: release
on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: build + test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # hatch-vcs reads the tag from git history

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/chronicle/frontend/package-lock.json

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Install packages for test gate
        run: |
          pip install -e 'packages/core[nats,kafka,rabbitmq,redis,test]'
          pip install -e 'packages/core-reporter[test]'
          pip install -e 'packages/chronicle[test]'

      - name: Run unit tests (all packages)
        run: pytest -m "not e2e and not chronicle_db"

      - name: Bring up broker stack
        run: docker compose -f docker/compose.e2e.yaml --profile all up -d --wait

      - name: Run e2e tests (transports)
        run: pytest -m e2e

      - name: Tear down broker stack
        if: always()
        run: docker compose -f docker/compose.e2e.yaml --profile all down -v

      - name: Bring up TimescaleDB
        run: docker compose -f docker/compose.chronicle.yaml up -d --wait

      - name: Run Chronicle migrations
        working-directory: packages/chronicle
        env:
          DATABASE_URL: postgresql+asyncpg://chronicle:chronicle@localhost:5433/chronicle
        run: alembic upgrade head

      - name: Run Chronicle e2e tests
        env:
          DATABASE_URL: postgresql+asyncpg://chronicle:chronicle@localhost:5433/chronicle
        run: pytest packages/chronicle/tests/ -m chronicle_db -o "addopts="

      - name: Tear down TimescaleDB
        if: always()
        run: docker compose -f docker/compose.chronicle.yaml down -v

      - name: Build Chronicle frontend
        working-directory: packages/chronicle/frontend
        run: |
          npm ci
          npm run lint
          npm audit --omit=dev
          npm run build

      - name: Build wheels + sdists
        run: |
          python -m build packages/core --outdir dist/
          python -m build packages/core-reporter --outdir dist/
          python -m build packages/chronicle --outdir dist/

      - name: Validate distributions
        run: twine check dist/*

      - name: Upload build artefacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist-${{ github.ref_name }}
          path: dist/
          retention-days: 30

  publish-pypi:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC for PyPI trusted publishing
    steps:
      - name: Download build artefacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist-${{ github.ref_name }}
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.12.4
        with:
          packages-dir: dist/

  github-release:
    name: create GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Download build artefacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist-${{ github.ref_name }}
          path: dist/

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          python scripts/extract_changelog.py "${GITHUB_REF_NAME}" > RELEASE_NOTES.md
          echo "notes-file=RELEASE_NOTES.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.notes-file }}
          files: dist/*
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
