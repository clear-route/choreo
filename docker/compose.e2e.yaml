# Docker Compose stack for end-to-end transport tests.
#
# Runs the dependencies the e2e suite needs. No harness code runs in a
# container — tests execute on the host and connect out to the exposed
# ports. Contract tests (`tests/e2e/contract/`) run once per installed +
# reachable transport; each service below corresponds to one transport
# factory. Services are grouped by profile so a dev can bring up only
# what they need.
#
# Usage:
#   # everything
#   docker compose -f docker/compose.e2e.yaml --profile all up -d
#
#   # a single transport
#   docker compose -f docker/compose.e2e.yaml --profile nats up -d
#   docker compose -f docker/compose.e2e.yaml --profile kafka up -d
#   docker compose -f docker/compose.e2e.yaml --profile rabbitmq up -d
#   docker compose -f docker/compose.e2e.yaml --profile redis up -d
#
#   pytest -m e2e
#   docker compose -f docker/compose.e2e.yaml --profile all down

services:
  # All ports are bound to 127.0.0.1 rather than 0.0.0.0 — these brokers
  # are local test dependencies with default or no authentication, so we
  # do not publish them onto the host's LAN.
  nats:
    image: nats:2.10-alpine
    container_name: choreo-e2e-nats
    profiles: ["all", "nats"]
    ports:
      - "127.0.0.1:4222:4222"   # client protocol
      - "127.0.0.1:8222:8222"   # monitoring / healthcheck
    command: ["-js", "-m", "8222"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 2s
      timeout: 2s
      retries: 10

  # Authenticated NATS — user/password required.  Used by the auth
  # contract tests (ADR-0020).  Runs on port 4223 alongside the
  # unauthenticated broker on 4222.  The sentinel password is
  # deliberately unusual so the CI log scanner can detect it if it
  # leaks into test output.
  nats-auth:
    image: nats:2.10-alpine
    container_name: choreo-e2e-nats-auth
    profiles: ["all", "nats", "nats-auth"]
    ports:
      - "127.0.0.1:4223:4222"
      - "127.0.0.1:8223:8222"
    command:
      - "-js"
      - "-m"
      - "8222"
      - "--user"
      - "test"
      - "--pass"
      - "choreo-e2e-password-do-not-log"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 2s
      timeout: 2s
      retries: 10

  # Kafka in single-node KRaft mode (no separate Zookeeper). The
  # KAFKA_LISTENER_* envs below are the standard single-broker recipe for
  # Confluent's KRaft image: one internal listener for controller traffic,
  # one external listener for clients connecting from the host.
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: choreo-e2e-kafka
    profiles: ["all", "kafka"]
    ports:
      - "127.0.0.1:9092:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Default is 3000 ms: a brand-new consumer group waits 3 s before
      # its first rebalance, to let additional members join. The harness
      # gives every subscribe() its own unique group_id for broadcast
      # fan-out, so we pay that delay on *every* subscribe. For single-
      # member test groups there's nothing to wait for; drop to 0.
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      # Deterministic cluster id so a container recreate reuses the same
      # KRaft metadata layout. KRaft rejects anything that is not a
      # 22-character base64-url-encoded UUID; the previous value
      # "choreo-e2e-cluster-id" was not, and the container crash-looped
      # on every `docker compose restart` with
      # "Cluster ID string ... does not appear to be a valid UUID".
      # Value is `base64.urlsafe_b64encode(uuid.UUID(...).bytes).rstrip('=')`
      # of the all-zero UUID with the trailing byte 0x42 — arbitrary but
      # human-recognisable.
      CLUSTER_ID: "AAAAAAAAAAAAAAAAAAAAQg"
      # cp-kafka defaults to a 1 GiB JVM heap. Docker Desktop on a dev
      # laptop commonly runs with ~2 GiB total, shared with NATS /
      # Rabbit / Redis — Kafka OOM-kills mid-suite (exit 137) under
      # that budget. 512 MiB heap is enough for the tens-of-topics
      # volume this suite creates and leaves headroom for the other
      # brokers. Bump both if you add heavier Kafka tests.
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"
    # Bound the container's RSS too: the JVM heap is only part of the
    # picture (direct buffers, metaspace, thread stacks add ~256 MiB).
    # 896 MiB total leaves ~1 GiB for Rabbit + Redis + NATS + the test
    # runner on a 2 GiB Docker VM.
    mem_limit: 896m
    # Auto-recover from transient crashes so a mid-suite stall (OOM,
    # healthcheck timeout, flaky network) doesn't require manual `docker
    # compose restart` between `pytest` invocations.
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 3s
      timeout: 5s
      retries: 30
      start_period: 15s

  rabbitmq:
    image: rabbitmq:3.13-alpine
    container_name: choreo-e2e-rabbitmq
    profiles: ["all", "rabbitmq"]
    ports:
      - "127.0.0.1:5672:5672"     # AMQP
      - "127.0.0.1:15672:15672"   # management UI (diagnostic only)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 2s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: choreo-e2e-redis
    profiles: ["all", "redis"]
    ports:
      - "127.0.0.1:6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10
